name: Deploy to Tencent Cloud COS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --registry https://registry.npmjs.org/

      # Next.js 静态导出 → out/（与 package.json build:static 一致）
      # 首页 / 登录 / 积分 / 核验与订单 / AI 日报 / AI 教程等均在浏览器内请求 API（见 src/config/api.js），构建期不会拉取这些业务数据。
      # 若预发或自建环境需指向非生产 API，在此步骤增加 env：NEXT_PUBLIC_API_BASE_URL
      - name: Build static site
        run: yarn build:static

      - name: Configure COS CLI
        run: |
          pip install coscmd cos-python-sdk-v5
          coscmd config -a ${{ secrets.TENCENT_SECRET_ID }} -s ${{ secrets.TENCENT_SECRET_KEY }} -b ${{ secrets.COS_BUCKET_NAME }} -r ${{ secrets.COS_REGION }}

      - name: Upload to COS
        run: |
          echo "📤 上传 Next 静态导出目录 out/ ..."
          cd out
          coscmd upload -rs ./ / --skipmd5

      - name: Set HTML Content-Type
        run: |
          echo "📤 更新 HTML 文件 Content-Type..."
          python3 scripts/set_html_content_type.py
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          COS_BUCKET_NAME: ${{ secrets.COS_BUCKET_NAME }}
          COS_REGION: ${{ secrets.COS_REGION }}
          STATIC_EXPORT_DIR: out

      - name: Deployment Summary
        run: |
          echo "✅ 部署完成！（静态站点来自 out/）"
          echo "📦 存储桶: ${{ secrets.COS_BUCKET_NAME }}"
          echo "🌍 地域: ${{ secrets.COS_REGION }}"
          echo ""
          echo "⚠️  next.config 的 redirects/headers 在静态导出不生效，请在 CDN 配置跳转与 /docs 的 Content-Type"
          echo "⚠️  请记得在腾讯云 CDN 控制台刷新缓存"
